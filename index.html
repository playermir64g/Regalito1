<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para kat</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 id="texto">¿Soy tu mejor amigo/Hermano?</h1>
        <img id="imagen" 
             src="https://previews.123rf.com/images/petersnow/petersnow1707/petersnow170700079/82556479-stick-figure-in-thinking-posture-stick-man-thinking-about-a-solution-to-a-question-vector.jpg" 
             alt="Pensando">
        <div id="tlacuaches" style="display: none;">
            <div class="tlacuache-container">
                <div class="tlacuache tlacua">
                    <div class="ears"></div>
                    <div class="face">
                        <div class="eyes"></div>
                        <div class="nose"></div>
                        <div class="whiskers"></div>
                        <div class="whiskers-right"></div>
                        <div class="mouth"></div>
                    </div>
                    <div class="tail"></div>
                </div>
                <div class="tlacuache cuache">
                    <div class="ears"></div>
                    <div class="face">
                        <div class="eyes"></div>
                        <div class="nose"></div>
                        <div class="whiskers"></div>
                        <div class="whiskers-right"></div>
                        <div class="mouth"></div>
                    </div>
                    <div class="tail"></div>
                </div>
            </div>
        </div>
        <div class="buttons" id="botones">
            <button class="btn-no-asco" onclick="presionarNoAsco()">No que asco</button>
            <button class="btn-no-quiero" id="btnNoQuiero" onclick="presionarNoQuiero()">Claro que si te quiero mucho</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
